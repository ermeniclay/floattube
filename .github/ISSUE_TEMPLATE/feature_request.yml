name: "💡 Feature request"
description: Suggest an idea or improvement for FloatTube
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: Your idea
      description: What would you like FloatTube to do?
      placeholder: "It would be great if the floating player had a speed control..."
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is this useful?
      placeholder: "This would help me because..."
    validations:
      required: false
