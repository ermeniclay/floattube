name: "🐞 Bug report"
description: Something isn't working in FloatTube
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for helping improve FloatTube! Please fill in the details below."
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
      placeholder: "The pop-out button does nothing when I click it..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a YouTube video
        2. Click the red pop-out button
        3. ...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser & version
      placeholder: "Chrome 126 / Edge / Opera"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: FloatTube version
      placeholder: "1.0.0"
    validations:
      required: false
